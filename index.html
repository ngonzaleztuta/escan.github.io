<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escáner de Inventario</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6f9;
    --white: #ffffff;
    --primary: #1565C0;
    --primary-light: #e3f0ff;
    --green: #2e7d32;
    --green-light: #e8f5e9;
    --red: #c62828;
    --red-light: #ffebee;
    --blue-info: #1565c0;
    --blue-info-light: #e3f2fd;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e2e8f0;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --tab-active: #1565C0;
    --tab-inactive: #9ca3af;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── TOP HEADER ── */
  .header {
    background: var(--primary);
    color: #fff;
    padding: 18px 16px 14px;
    text-align: center;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.3px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(21,101,192,0.25);
  }

  /* ── BOTTOM TABS ── */
  .bottom-tabs {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.07);
  }
  .tab-btn {
    flex: 1;
    padding: 10px 0 12px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: all 0.2s;
  }
  .tab-btn .tab-icon { font-size: 22px; }
  .tab-btn .tab-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--tab-inactive);
    letter-spacing: 0.4px;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .tab-btn.active .tab-label { color: var(--tab-active); }
  .tab-btn .tab-indicator {
    width: 0; height: 3px;
    background: var(--tab-active);
    border-radius: 99px;
    transition: width 0.25s ease;
    margin-top: 2px;
  }
  .tab-btn.active .tab-indicator { width: 32px; }

  /* ── PAGES ── */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* ── SCANNER PAGE ── */
  #scanner-container {
    width: 100%;
    max-width: 440px;
    margin: 0 auto 14px;
    border-radius: var(--radius);
    overflow: hidden;
    background: #000;
    position: relative;
    height: 220px;
    box-shadow: var(--shadow);
  }
  #scanner-container video,
  #scanner-container canvas {
    width: 100%; height: 100%;
    object-fit: cover;
    position: absolute; top: 0; left: 0;
  }
  .scan-overlay {
    position: absolute; inset: 0;
    z-index: 9;
    display: flex; align-items: center; justify-content: center;
  }
  .scan-frame {
    width: 200px; height: 100px;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 8px;
    position: relative;
  }
  .scan-frame::before, .scan-frame::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-color: #00e676;
    border-style: solid;
  }
  .scan-frame::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .scan-frame::after  { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
  .linea-scan {
    position: absolute;
    left: 10%; right: 10%; top: 50%;
    height: 2px;
    background: #00e676;
    box-shadow: 0 0 10px #00e676, 0 0 20px rgba(0,230,118,0.4);
    z-index: 10;
    animation: scan 2s ease-in-out infinite;
  }
  @keyframes scan {
    0%   { top: 20%; opacity: 1; }
    50%  { top: 80%; opacity: 0.8; }
    100% { top: 20%; opacity: 1; }
  }

  .btn-row {
    max-width: 440px;
    margin: 0 auto 14px;
    display: flex; gap: 10px;
  }
  .btn {
    flex: 1; padding: 13px 10px;
    border: none; border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn-escanear { background: var(--primary); color: #fff; }
  .btn-detener  { background: var(--red); color: #fff; display: none; }
  .btn-guardar  { background: var(--green); color: #fff; width: 100%; }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 18px;
    max-width: 440px;
    margin: 0 auto 14px;
    box-shadow: var(--shadow);
  }
  .campo { margin-bottom: 14px; }
  label {
    display: block; font-size: 11px; color: var(--muted);
    margin-bottom: 5px; text-transform: uppercase;
    letter-spacing: 0.6px; font-weight: 600;
  }
  input, select {
    width: 100%; padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 9px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; color: var(--text);
    background: #fafbfc;
    transition: border-color 0.2s;
  }
  input:focus, select:focus {
    outline: none; border-color: var(--primary); background: #fff;
  }
  #codigoDetectado {
    background: var(--green-light);
    border-color: #a5d6a7;
    color: var(--green);
    font-family: 'DM Mono', monospace;
    font-weight: 500;
  }

  #estado {
    text-align: center; font-size: 14px; font-weight: 500;
    padding: 11px 14px; border-radius: 9px;
    margin-top: 10px; display: none;
  }
  .exito   { background: var(--green-light);   color: var(--green); }
  .error   { background: var(--red-light);     color: var(--red); }
  .cargando{ background: var(--blue-info-light);color: var(--blue-info); }

  /* ── INVENTARIO PAGE ── */
  .inv-header {
    max-width: 440px;
    margin: 0 auto 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .inv-title {
    font-size: 18px; font-weight: 700; color: var(--text);
  }
  .inv-count {
    font-size: 13px; color: var(--muted); font-weight: 500;
  }
  .btn-refresh {
    background: var(--primary-light); color: var(--primary);
    border: none; border-radius: 8px;
    padding: 8px 14px; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: background 0.2s;
  }
  .btn-refresh:hover { background: #c8deff; }
  .btn-refresh.spinning .refresh-icon { animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .refresh-icon { display: inline-block; }

  /* Filter bar */
  .filter-bar {
    max-width: 440px;
    margin: 0 auto 14px;
    display: flex; gap: 8px; overflow-x: auto;
    padding-bottom: 4px; scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    white-space: nowrap;
    padding: 6px 14px;
    border-radius: 99px;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    color: var(--muted); cursor: pointer;
    transition: all 0.15s;
  }
  .filter-chip.active {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  /* Item cards */
  .inv-list {
    max-width: 440px;
    margin: 0 auto;
    display: flex; flex-direction: column; gap: 10px;
  }
  .inv-item {
    background: var(--white);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow);
    display: flex; align-items: flex-start; gap: 12px;
    animation: slideIn 0.25s ease both;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .inv-item-icon {
    width: 42px; height: 42px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .inv-item-body { flex: 1; min-width: 0; }
  .inv-item-name {
    font-size: 15px; font-weight: 700; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .inv-item-code {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--muted);
    margin-bottom: 6px;
  }
  .inv-item-meta {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 3px 9px; border-radius: 99px;
    font-size: 11px; font-weight: 600;
  }
  .badge-tipo { background: #ede9fe; color: #5b21b6; }
  .badge-vence { background: #fef9c3; color: #854d0e; }
  .badge-aviso { background: #fee2e2; color: #991b1b; }
  .badge-ok    { background: var(--green-light); color: var(--green); }

  /* Empty / loading states */
  .empty-state {
    text-align: center; padding: 48px 20px;
    color: var(--muted);
    max-width: 440px; margin: 0 auto;
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; font-weight: 500; }

  .skeleton {
    max-width: 440px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 10px;
  }
  .skel-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow);
    display: flex; gap: 12px;
  }
  .skel-icon { width: 42px; height: 42px; border-radius: 10px; background: #e9ecef; flex-shrink: 0; }
  .skel-body { flex: 1; display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }
  .skel-line {
    height: 12px; border-radius: 6px;
    background: linear-gradient(90deg, #e9ecef 25%, #f3f4f6 50%, #e9ecef 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  .skel-line.short { width: 55%; }
  .skel-line.xshort { width: 35%; }
  @keyframes shimmer { to { background-position: -200% 0; } }
</style>
</head>
<body>

<div class="header"> Escáner de Inventario</div>

<!-- ════ PAGE: ESCANEAR ════ -->
<div class="page active" id="page-scan">

  <div id="scanner-container">
    <div class="scan-overlay"><div class="scan-frame"></div></div>
    <div class="linea-scan"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-escanear" id="btnEscanear" onclick="iniciarEscaner()"> Activar cámara</button>
    <button class="btn btn-detener"  id="btnDetener"  onclick="detenerEscaner()"> Detener</button>
  </div>

  <div class="card">
    <div class="campo">
      <label>Código escaneado</label>
      <input type="text" id="codigoDetectado" placeholder="Escanea un código..." readonly />
    </div>
    <div class="campo">
      <label>Nombre del producto</label>
      <input type="text" id="nombre"  />
    </div>
    <div class="campo">
      <label>Tipo</label>
      <select id="tipo">
        <option value="Alimento">Alimento</option>
        <option value="Bebida">Bebida</option>
        <option value="Lacteos">Lácteos</option>
        <option value="Condimentos">Condimentos</option>
        <option value="Snacks">Snacks</option>
        <option value="Enlatados">Enlatados</option>
        <option value="Granos">Granos</option>
        <option value="Panaderia">Panadería</option>
      </select>
    </div>
    <div class="campo">
      <label>Fecha de vencimiento</label>
      <input type="date" id="fechaVence" />
    </div>
    <div class="campo">
      <label>Fecha de aviso</label>
      <input type="date" id="fechaAviso" />
    </div>
    <button class="btn btn-guardar" onclick="guardarEnAirtable()"> Guardar en Airtable</button>
    <div id="estado"></div>
  </div>

</div>

<!-- ════ PAGE: INVENTARIO ════ -->
<div class="page" id="page-inv">

  <div class="inv-header">
    <div>
      <div class="inv-title">Inventario</div>
      <div class="inv-count" id="inv-count">Cargando...</div>
    </div>
    <button class="btn-refresh" id="btnRefresh" onclick="cargarInventario()">
      <span class="refresh-icon">🔄</span> Actualizar
    </button>
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-chip active" data-tipo="Todos" onclick="filtrar(this)">Todos</button>
    <button class="filter-chip" data-tipo="Alimento"   onclick="filtrar(this)">Alimento</button>
    <button class="filter-chip" data-tipo="Bebida"     onclick="filtrar(this)">Bebida</button>
    <button class="filter-chip" data-tipo="Lacteos"    onclick="filtrar(this)">Lácteos</button>
    <button class="filter-chip" data-tipo="Condimentos" onclick="filtrar(this)">Condimentos</button>
    <button class="filter-chip" data-tipo="Snacks"     onclick="filtrar(this)">Snacks</button>
    <button class="filter-chip" data-tipo="Enlatados"  onclick="filtrar(this)">Enlatados</button>
    <button class="filter-chip" data-tipo="Granos"     onclick="filtrar(this)">Granos</button>
    <button class="filter-chip" data-tipo="Panaderia"  onclick="filtrar(this)">Panadería</button>
  </div>

  <div id="inv-content"></div>

</div>

<!-- ════ BOTTOM TABS ════ -->
<div class="bottom-tabs">
  <button class="tab-btn active" id="tab-scan" onclick="cambiarTab('scan')">
    <span class="tab-icon"></span>
    <span class="tab-label">Escanear</span>
    <div class="tab-indicator"></div>
  </button>
  <button class="tab-btn" id="tab-inv" onclick="cambiarTab('inv')">
    <span class="tab-icon"></span>
    <span class="tab-label">Inventario</span>
    <div class="tab-indicator"></div>
  </button>
</div>

<script>
  // ── Config Airtable ──
  const TOKEN   = "patH2lLXW4YJYez4a.cd0772ea1837b4cdbd8579e6840f7e36bcb17e0214ab2fafa10252d6d2fd2cea";
  const BASE_ID = "appNGlPOc4Q3DKGNC";
  const TABLA   = "Table 1";

  let escaneando = false;
  let ultimoCodigo = "";
  let todosLosItems = [];
  let filtroActual = "Todos";

  // ── Tabs ──
  function cambiarTab(tab) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'inv') cargarInventario();
  }

  // ── Escáner ──
  function iniciarEscaner() {
    Quagga.init({
      inputStream: {
        name: "Live", type: "LiveStream",
        target: document.getElementById("scanner-container"),
        constraints: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } }
      },
      decoder: { readers: ["ean_reader","ean_8_reader","code_128_reader","code_39_reader","upc_reader"] }
    }, function(err) {
      if (err) { mostrarEstado(" No se pudo acceder a la cámara: " + err, "error"); return; }
      Quagga.start();
      escaneando = true;
      document.getElementById("btnEscanear").style.display = "none";
      document.getElementById("btnDetener").style.display = "block";
    });
    Quagga.onDetected(function(result) {
      const codigo = result.codeResult.code;
      if (codigo !== ultimoCodigo) {
        ultimoCodigo = codigo;
        document.getElementById("codigoDetectado").value = codigo;
        if (navigator.vibrate) navigator.vibrate(200);
        detenerEscaner();
      }
    });
  }

  function detenerEscaner() {
    if (escaneando) { Quagga.stop(); escaneando = false; }
    document.getElementById("btnEscanear").style.display = "block";
    document.getElementById("btnDetener").style.display  = "none";
  }

  // ── Guardar ──
  async function guardarEnAirtable() {
    const codigo     = document.getElementById("codigoDetectado").value.trim();
    const nombre     = document.getElementById("nombre").value.trim();
    const tipo       = document.getElementById("tipo").value;
    const fechaVence = document.getElementById("fechaVence").value;
    const fechaAviso = document.getElementById("fechaAviso").value;

    if (!codigo)   { mostrarEstado("Primero escanea un código", "error"); return; }
    if (!nombre)   { mostrarEstado(" Ingresa el nombre del producto", "error"); return; }
    if (!fechaVence || !fechaAviso) { mostrarEstado("Ingresa las fechas", "error"); return; }

    mostrarEstado(" Guardando...", "cargando");

    try {
      const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLA)}`, {
        method: "POST",
        headers: { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/json" },
        body: JSON.stringify({ fields: {
          "CODIGO": String(codigo), "Nombre": nombre, "Tipo": tipo,
          "Fecha vencimiento": fechaVence, "Fecha Aviso": fechaAviso
        }})
      });
      if (res.ok) {
        mostrarEstado(" ¡Guardado exitosamente en Airtable!", "exito");
        limpiarFormulario();
      } else {
        const err = await res.json();
        mostrarEstado(" Error: " + (err.error?.message || res.status), "error");
      }
    } catch (e) {
      mostrarEstado(" Error de conexión: " + e.message, "error");
    }
  }

  function limpiarFormulario() {
    ["codigoDetectado","nombre","fechaVence","fechaAviso"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("tipo").value = "Alimento";
    ultimoCodigo = "";
  }

  function mostrarEstado(msg, tipo) {
    const el = document.getElementById("estado");
    el.textContent = msg; el.className = tipo; el.style.display = "block";
    if (tipo === "exito") setTimeout(() => { el.style.display = "none"; }, 3000);
  }

  // ── Inventario ──
  
    
  ;
  const tipoColor = {
    "Alimento":"#fff3e0","Bebida":"#e3f2fd","Lacteos":"#f3e5f5","Condimentos":"#e8f5e9",
    "Snacks":"#fce4ec","Enlatados":"#e0f2f1","Granos":"#fffde7","Panaderia":"#fbe9e7",
    "default":"#f5f5f5"
  };

  async function cargarInventario() {
    const btn = document.getElementById("btnRefresh");
    btn.classList.add("spinning");
    document.getElementById("inv-content").innerHTML = skeletonHTML();
    document.getElementById("inv-count").textContent = "Cargando...";

    try {
      let url = `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLA)}?pageSize=100`;
      const res = await fetch(url, { headers: { "Authorization": "Bearer " + TOKEN } });
      const data = await res.json();
      todosLosItems = (data.records || []).map(r => ({ id: r.id, ...r.fields }));
      // Sort by creation: newest first (Airtable returns by created by default)
      todosLosItems.reverse();
      renderInventario();
    } catch (e) {
      document.getElementById("inv-content").innerHTML =
        `<div class="empty-state"><div class="empty-icon"></div><p>Error al cargar: ${e.message}</p></div>`;
      document.getElementById("inv-count").textContent = "";
    }
    btn.classList.remove("spinning");
  }

  function filtrar(chip) {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    filtroActual = chip.dataset.tipo;
    renderInventario();
  }

  function renderInventario() {
    const items = filtroActual === "Todos"
      ? todosLosItems
      : todosLosItems.filter(i => i["Tipo"] === filtroActual);

    const total = todosLosItems.length;
    document.getElementById("inv-count").textContent =
      filtroActual === "Todos"
        ? `${total} producto${total !== 1 ? "s" : ""}`
        : `${items.length} de ${total}`;

    if (items.length === 0) {
      document.getElementById("inv-content").innerHTML =
        `<div class="empty-state"><div class="empty-icon"></div><p>No hay productos${filtroActual !== 'Todos' ? ' en esta categoría' : ''}</p></div>`;
      return;
    }

    const today = new Date(); today.setHours(0,0,0,0);
    const html = items.map((item, i) => {
      const tipo  = item["Tipo"] || "default";
      const icon  = tipoIcono[tipo] || tipoIcono["default"];
      const color = tipoColor[tipo] || tipoColor["default"];
      const nombre = item["Nombre"] || "Sin nombre";
      const codigo = item["CODIGO"] || "—";
      const vence  = item["Fecha vencimiento"] || null;
      const aviso  = item["Fecha Aviso"] || null;

      let venceBadge = "";
      if (vence) {
        const d = new Date(vence + "T00:00:00");
        const diff = Math.round((d - today) / 86400000);
        const label = diff < 0 ? `Venció hace ${Math.abs(diff)}d` : diff === 0 ? "Vence hoy" : `Vence en ${diff}d`;
        const cls   = diff < 0 ? "badge-aviso" : diff <= 7 ? "badge-vence" : "badge-ok";
        venceBadge  = `<span class="badge ${cls}"> ${label}</span>`;
      }

      return `
        <div class="inv-item" style="animation-delay:${i * 0.04}s">
          <div class="inv-item-icon" style="background:${color}">${icon}</div>
          <div class="inv-item-body">
            <div class="inv-item-name">${nombre}</div>
            <div class="inv-item-code">${codigo}</div>
            <div class="inv-item-meta">
              <span class="badge badge-tipo">${tipo}</span>
              ${venceBadge}
            </div>
          </div>
        </div>`;
    }).join("");

    document.getElementById("inv-content").innerHTML = `<div class="inv-list">${html}</div>`;
  }

  function skeletonHTML() {
    return `<div class="skeleton">${[1,2,3,4].map(() => `
      <div class="skel-card">
        <div class="skel-icon"></div>
        <div class="skel-body">
          <div class="skel-line"></div>
          <div class="skel-line short"></div>
          <div class="skel-line xshort"></div>
        </div>
      </div>`).join("")}</div>`;
  }
</script>
